name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxext-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxcomposite-dev \
            libfreetype-dev libfontconfig1-dev ninja-build xvfb

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run smoke tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a ctest --test-dir build -C Release --output-on-failure

      - name: Run smoke tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KissOfShame-${{ matrix.os }}
          path: |
            build/KissOfShame_artefacts/Release/VST3
            build/KissOfShame_artefacts/Release/AU
            build/KissOfShame_artefacts/Release/Standalone
          if-no-files-found: warn
