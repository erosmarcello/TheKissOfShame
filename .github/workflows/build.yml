name: Build

# push is scoped to the default branch: feature-branch pushes are already
# covered by the pull_request trigger, and double-running every push wastes
# minutes and doubles CI noise.
on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxext-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxcomposite-dev \
            libfreetype-dev libfontconfig1-dev ninja-build xvfb

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run smoke tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a ctest --test-dir build -C Release --output-on-failure

      - name: Run smoke tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: ctest --test-dir build -C Release --output-on-failure

      # Cross-DAW robustness gate: pluginval exercises the VST3 the way a
      # hostile host would (threading, automation, state, editor lifecycle).
      - name: pluginval (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sL "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip" -o pluginval.zip
          unzip -o -q pluginval.zip
          xvfb-run -a ./pluginval --strictness-level 5 --verbose \
            --validate "build/KissOfShame_artefacts/Release/VST3/The Kiss Of Shame.vst3"

      - name: pluginval (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip" -o pluginval.zip
          unzip -o -q pluginval.zip
          pluginval.app/Contents/MacOS/pluginval --strictness-level 5 --verbose \
            --validate "build/KissOfShame_artefacts/Release/VST3/The Kiss Of Shame.vst3"

      - name: pluginval (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip" -OutFile pluginval.zip
          Expand-Archive -Force pluginval.zip .
          ./pluginval.exe --strictness-level 5 --verbose --validate "build/KissOfShame_artefacts/Release/VST3/The Kiss Of Shame.vst3"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KissOfShame-${{ matrix.os }}
          path: |
            build/KissOfShame_artefacts/Release/VST3
            build/KissOfShame_artefacts/Release/AU
            build/KissOfShame_artefacts/Release/Standalone
          if-no-files-found: warn
